function load(key, fb) { try { const s=localStorage.getItem(key); return s?JSON.parse(s):fb; } catch{return fb;} }
function save(key, v)  { try { localStorage.setItem(key,JSON.stringify(v)); } catch{} }

function computeStatus(f) {
  if (!f.sold) return 'Osåld';
  const hand = ['Hämtas','Avlämnas'].includes(f.fraktmetod);
  if (hand) return f.betald ? 'Klar' : 'Överlämning';
  if (f.fraktkod && f.bokadFrakt) return f.betald ? 'Klar' : 'Skickad';
  if (f.bokadFrakt) return 'Frakt bokad';
  return 'Väntar frakt';
}

/* ── Icon ── */
function Icon({ name, size=20, color, style:st }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !window.lucide) return;
    ref.current.innerHTML = '';
    const def = window.lucide.icons[name];
    if (!def) return;
    const ns='http://www.w3.org/2000/svg';
    const svg=document.createElementNS(ns,'svg');
    svg.setAttribute('width',size); svg.setAttribute('height',size);
    svg.setAttribute('viewBox','0 0 24 24'); svg.setAttribute('fill','none');
    svg.setAttribute('stroke',color||'currentColor');
    svg.setAttribute('stroke-width','2');
    svg.setAttribute('stroke-linecap','round'); svg.setAttribute('stroke-linejoin','round');
    svg.innerHTML = def[2].map(([tag,attrs])=>{
      const el=document.createElementNS(ns,tag);
      Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));
      return el.outerHTML;
    }).join('');
    ref.current.appendChild(svg);
  },[name,size,color]);
  return <span ref={ref} style={{display:'inline-flex',alignItems:'center',flexShrink:0,...st}} />;
}

  const s = STATUS_DEF[status] || STATUS_DEF['Osåld'];
  const big = size==='md';
  return (
    <span style={{
      display:'inline-flex', alignItems:'center', gap:5,
      background:s.bg, color:s.color,
      padding: big ? '5px 12px' : '3px 9px',
      borderRadius:999, fontSize: big?13:11, fontWeight:700,
      whiteSpace:'nowrap', letterSpacing:0.1
    }}>
      <Icon name={s.icon} size={big?13:11} color={s.color} />
      {status}
    </span>
  );
}

        <button onClick={onBack} style={{ background:C.bg, border:'none', width:36, height:36, borderRadius:10, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', flexShrink:0 }}>
          <Icon name="chevron-left" size={20} color={C.text} />
        </button>
      )}
      <div style={{ flex:1 }}>
        <div style={{ fontSize:18, fontWeight:700, color:C.text, letterSpacing:-0.3 }}>{title}</div>
        {sub && <div style={{ fontSize:12, color:C.textSec, marginTop:1 }}>{sub}</div>}
      </div>
      {right}

}

      background:C.surface, borderRadius:14, padding:'13px 16px',
      cursor:'pointer', userSelect:'none', gap:12
    }}>

        <div style={{ fontSize:15, fontWeight:600, color:C.text }}>{label}</div>
        {sub && <div style={{ fontSize:12, color:C.textSec, marginTop:1 }}>{sub}</div>}
      </div>
      <div style={{ width:48, height:28, borderRadius:999, background:value?C.primary:C.border, position:'relative', transition:'background 150ms', flexShrink:0 }}>
        <div style={{ position:'absolute', width:22, height:22, background:'white', borderRadius:'50%', top:3, left:value?23:3, transition:'left 150ms', boxShadow:'0 1px 4px rgba(0,0,0,0.2)' }} />
      </div>
    </div>
  );
}

/* ── Form helpers ── */
const inp = { width:'100%', padding:'11px 13px', fontSize:15, fontFamily:'inherit', background:C.surface, border:`1.5px solid #E4E2DD`, borderRadius:11, color:'#1C1C1E', transition:'border-color 150ms' };
function TI({ value, onChange, placeholder, type='text' }) {
  return <input value={value||''} onChange={e=>onChange(e.target.value)} placeholder={placeholder} type={type}
    onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor='#E4E2DD'} style={inp} />;
}
function SI({ value, onChange, options }) {
  return <select value={value} onChange={e=>onChange(e.target.value)} style={{...inp,appearance:'none'}}>
    {options.map(o=>typeof o==='string'?<option key={o} value={o}>{o}</option>:<option key={o.v} value={o.v}>{o.l}</option>)}
  </select>;
}
function FL({ label, children, col }) {
  return <div style={{ display:'flex', flexDirection:'column', gap:5, flex:col||undefined }}>
    <div style={{ fontSize:12, fontWeight:700, color:C.textSec, letterSpacing:0.2 }}>{label}</div>
    {children}
  </div>;
}

/* ── Section card ── */
function SCard({ accent, icon, title, children, className }) {
  return (
    <div className={className} style={{ background:C.surface, borderRadius:16, overflow:'hidden', boxShadow:'0 2px 10px rgba(0,0,0,0.06)', marginBottom:12 }}>
      {title && (
        <div style={{ display:'flex', alignItems:'center', gap:8, padding:'12px 16px 10px', borderBottom:`1px solid ${C.border}`, background: accent?accent+'10':undefined }}>
          {icon && <Icon name={icon} size={15} color={accent||C.textSec} />}
          <div style={{ fontSize:12, fontWeight:700, color:accent||C.textSec, textTransform:'uppercase', letterSpacing:0.8 }}>{title}</div>
        </div>
      )}
      <div style={{ padding:'14px 16px' }}>{children}</div>
    </div>
  );
}

/* ══════════════════════════════════════
   HEM
══════════════════════════════════════ */
function HemScreen({ items, owners }) {
  const sold = items.filter(i=>i.sold);
  const omsat = sold.reduce((s,i)=>s+(parseFloat(i.saltPris)||0),0);
  const carro = sold.reduce((s,i)=>s+Math.round((parseFloat(i.saltPris)||0)*(i.carroAndel/100)),0);
  const agare = omsat - carro;

  const alerts = [
    { label:'Obetald', val:sold.filter(i=>!i.betald).length, color:C.red, icon:'credit-card' },
    { label:'Väntar frakt', val:items.filter(i=>i.status==='Väntar frakt').length, color:'#92400E', icon:'clock' },
    { label:'Väntar överlämning', val:items.filter(i=>i.status==='Överlämning').length, color:'#5B21B6', icon:'map-pin' },
  ].filter(a=>a.val>0);

  return (
    <div className="scroll">
      <div style={{ background:C.surface, padding:'14px 16px 12px', borderBottom:`1px solid ${C.border}` }}>
        <div style={{ fontSize:22, fontWeight:700, color:C.text, letterSpacing:-0.3 }}>Hem</div>
        <div style={{ fontSize:13, color:C.textSec, marginTop:1 }}>April 2026</div>
      </div>
      <div style={{ padding:16, display:'flex', flexDirection:'column', gap:12 }}>

        {/* Hero */}
        <div style={{ background:C.primary, borderRadius:20, padding:'22px 20px', boxShadow:'0 6px 24px rgba(90,127,110,0.28)' }}>
          <div style={{ color:'rgba(255,255,255,0.7)', fontSize:13, fontWeight:500, marginBottom:4 }}>Omsättning denna månad</div>
          <div style={{ color:'white', fontSize:36, fontWeight:700, letterSpacing:-1, marginBottom:2 }}>{omsat.toLocaleString('sv-SE')} kr</div>
          <div style={{ color:'rgba(255,255,255,0.6)', fontSize:13 }}>{sold.length} sålda objekt · {items.filter(i=>!i.sold).length} osålda</div>
          <div style={{ height:1, background:'rgba(255,255,255,0.15)', margin:'16px 0' }} />
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:4 }}>
            <div>
              <div style={{ color:'rgba(255,255,255,0.65)', fontSize:12, fontWeight:500, marginBottom:3 }}>Carros andel</div>
              <div style={{ color:'white', fontSize:22, fontWeight:700 }}>{carro.toLocaleString('sv-SE')} kr</div>
            </div>
            <div>
              <div style={{ color:'rgba(255,255,255,0.65)', fontSize:12, fontWeight:500, marginBottom:3 }}>Ägarna får</div>
              <div style={{ color:'white', fontSize:22, fontWeight:700 }}>{agare.toLocaleString('sv-SE')} kr</div>
            </div>
          </div>
        </div>

        {/* Action alerts */}
        {alerts.length > 0 && (
          <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
            {alerts.map(a => (
              <div key={a.label} style={{ background:C.surface, borderRadius:13, padding:'12px 14px', boxShadow:'0 2px 8px rgba(0,0,0,0.06)', display:'flex', alignItems:'center', gap:10, borderLeft:`3px solid ${a.color}` }}>
                <Icon name={a.icon} size={18} color={a.color} />
                <div style={{ flex:1 }}>
                  <span style={{ fontSize:14, fontWeight:600, color:C.text }}>{a.val} objekt</span>
                  <span style={{ fontSize:14, color:C.textSec }}> · {a.label}</span>
                </div>
                <Icon name="chevron-right" size={16} color={C.textMuted} />
              </div>
            ))}
          </div>
        )}

        {/* Owner summary */}
        <div style={{ fontSize:14, fontWeight:700, color:C.text, marginTop:4 }}>Per ägare</div>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
          {owners.map(o => {
            const oi=items.filter(i=>i.ownerId===o.id&&i.sold);
            const tot=oi.reduce((s,i)=>s+(parseFloat(i.saltPris)||0),0);
            const cut=oi.reduce((s,i)=>s+Math.round((parseFloat(i.saltPris)||0)*(i.carroAndel/100)),0);
            return (
              <div key={o.id} style={{ background:C.surface, borderRadius:14, padding:'12px 14px', boxShadow:'0 2px 8px rgba(0,0,0,0.06)', borderTop:`3px solid ${o.color}` }}>
                <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:8 }}>
                  <OwnerDot owner={o} size={22} />
                  <span style={{ fontSize:14, fontWeight:600, color:C.text }}>{o.name}</span>
                </div>
                <div style={{ fontSize:18, fontWeight:700, color:C.text }}>{(tot-cut).toLocaleString('sv-SE')} kr</div>
                <div style={{ fontSize:11, color:C.textSec, marginTop:2 }}>ägarandel · {oi.length} sålda</div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   OBJEKT
══════════════════════════════════════ */
function ObjektScreen({ items, owners, onSelect, onNav }) {
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('Alla');
  const FILTERS=['Alla','Osåld','Såld','Obetald','Väntar frakt','Frakt bokad','Skickad','Överlämning','Klar'];

  const filtered = items.filter(i => {
    if (search && !i.title.toLowerCase().includes(search.toLowerCase())) return false;
    if (filter==='Alla') return true;
    if (filter==='Såld') return i.sold;
    if (filter==='Osåld') return !i.sold;
    if (filter==='Obetald') return i.sold&&!i.betald;
    return i.status===filter;
  });

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%' }}>
      {/* Header */}
      <div style={{ background:C.surface, flexShrink:0, borderBottom:`1px solid ${C.border}` }}>
        <div style={{ padding:'12px 16px 8px', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div style={{ fontSize:22, fontWeight:700, color:C.text, letterSpacing:-0.3 }}>Objekt</div>
          <button onClick={()=>onNav('nytt')} style={{ background:C.cta, border:'none', color:'white', fontWeight:700, fontSize:14, padding:'8px 14px', borderRadius:10, cursor:'pointer', display:'flex', alignItems:'center', gap:5 }}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Nytt
          </button>
        </div>
        <div style={{ margin:'0 16px 8px', display:'flex', alignItems:'center', gap:8, background:C.bg, borderRadius:11, padding:'9px 13px' }}>
          <Icon name="search" size={15} color={C.textMuted} />
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Sök objekt…"
            style={{ border:'none', background:'none', flex:1, fontSize:15, outline:'none', fontFamily:'inherit', color:C.text }} />
          {search && <button onClick={()=>setSearch('')} style={{ background:'none', border:'none', cursor:'pointer', color:C.textMuted, fontSize:20, lineHeight:1, padding:0 }}>×</button>}
        </div>
        <div style={{ display:'flex', gap:6, padding:'0 16px 10px', overflowX:'auto', scrollbarWidth:'none' }}>
          {FILTERS.map(f=>(
            <button key={f} onClick={()=>setFilter(f)} style={{ background:filter===f?C.primary:C.bg, color:filter===f?'white':C.textSec, border:'none', borderRadius:999, padding:'5px 12px', fontSize:12, fontWeight:600, cursor:'pointer', whiteSpace:'nowrap', fontFamily:'inherit', flexShrink:0 }}>{f}</button>
          ))}
        </div>
      </div>

      <div className="scroll" style={{ padding:'10px 14px 24px' }}>
        {filtered.length===0 && <div style={{ textAlign:'center', color:C.textMuted, fontSize:14, marginTop:48 }}>Inga objekt hittades</div>}
        <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
          {filtered.map(item => {
            const owner=owners.find(o=>o.id===item.ownerId);
            const catIcon=CATEGORY_ICON[item.category]||'package-2';
            return (
              <div key={item.id} onClick={()=>onSelect(item)} style={{ background:C.surface, borderRadius:16, boxShadow:'0 2px 10px rgba(0,0,0,0.07)', display:'flex', alignItems:'stretch', cursor:'pointer', overflow:'hidden' }}>
                {/* Photo */}
                <div style={{ width:80, flexShrink:0, background:owner?owner.color+'18':C.primaryLight, display:'flex', alignItems:'center', justifyContent:'center', overflow:'hidden' }}>
                  {item.photo
                    ? <img src={item.photo} alt={item.title} style={{ width:'100%', height:'100%', objectFit:'cover' }} />
                    : <Icon name={catIcon} size={22} color={owner?owner.color:C.primary} />}
                </div>
                {/* Info */}
                <div style={{ flex:1, padding:'11px 13px 11px', minWidth:0, display:'flex', flexDirection:'column', gap:4 }}>
                  {/* Row 1: title + price */}
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', gap:8 }}>
                    <div style={{ fontSize:15, fontWeight:700, color:C.text, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', flex:1 }}>{item.title}</div>
                    <div style={{ fontSize:15, fontWeight:700, color:item.sold?C.primary:C.text, flexShrink:0 }}>
                      {item.sold?`${item.saltPris} kr`:`${item.utpris} kr`}
                    </div>
                  </div>
                  {/* Row 2: owner + platform */}
                  <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                    {owner && <><OwnerDot owner={owner} size={15}/><span style={{ fontSize:12, fontWeight:600, color:owner.color }}>{owner.name}</span></>}
                    <span style={{ fontSize:11, color:C.border }}>·</span>
                    <span style={{ fontSize:12, color:C.textSec }}>{item.platform}</span>
                    {!item.sold && <span style={{ fontSize:11, color:C.textMuted, marginLeft:'auto' }}>utpris</span>}
                  </div>
                  {/* Row 3: status */}
                  <div style={{ marginTop:2 }}><StatusBadge status={item.status} /></div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

const BLANK = { title:'',desc:'',category:'Kläder',utpris:'',platform:'Vinted',ownerId:1,carroAndel:100,sold:false,saltPris:'',datumSald:'',kopare:'',adress:'',postnr:'',ort:'',betald:false,betaldatum:'',fraktmetod:'Postpaket',bokadFrakt:false,fraktbolag:'Postnord',annatFraktbolag:'',fraktkod:'',fraktdatum:'',overlamnningsdatum:'' };

function ItemFormScreen({ item, owners, onSave, onBack, onDelete }) {
  const isEdit=!!item;
  const [form, setForm]=useState(item?{...item}:{...BLANK});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const isHandover=['Hämtas','Avlämnas'].includes(form.fraktmetod);
  const owner=owners.find(o=>o.id===form.ownerId);
  const saltPrisNum=parseFloat(form.saltPris||0);
  const carroBelopp=form.sold&&saltPrisNum?Math.round(saltPrisNum*(form.carroAndel/100)):null;
  const agareBelopp=carroBelopp!==null?saltPrisNum-carroBelopp:null;

  const handleSave=()=>{ const status=computeStatus(form); onSave({...form,status,id:form.id||Date.now()}); };

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%' }}>

      />

      <div className="scroll" style={{ paddingBottom:88 }}>
        {/* Photo */}
        <div style={{ background:C.surface, padding:'14px 16px', borderBottom:`1px solid ${C.border}` }}>
          <div style={{ background:owner?owner.color+'14':C.primaryLight, borderRadius:14, height:120, display:'flex', alignItems:'center', justifyContent:'center', marginBottom:12 }}>
            <Icon name={CATEGORY_ICON[form.category]||'image'} size={40} color={owner?owner.color+'60':C.primary+'60'} />
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
            <button style={{ background:C.primary,color:'white',border:'none',borderRadius:12,height:46,fontSize:15,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8 }}>
              <Icon name="camera" size={17} color="white"/>Ta foto
            </button>
            <button style={{ background:C.bg,color:C.text,border:`1.5px solid ${C.border}`,borderRadius:12,height:46,fontSize:15,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8 }}>
              <Icon name="image" size={17} color={C.textSec}/>Galleri
            </button>
          </div>
        </div>

        <div style={{ padding:'12px 14px 0' }}>

          {/* ── Grundinfo ── */}

              <FL label="Titel"><TI value={form.title} onChange={v=>set('title',v)} placeholder="t.ex. Röd klänning M"/></FL>
              <FL label="Beskrivning">
                <textarea value={form.desc||''} onChange={e=>set('desc',e.target.value)} placeholder="Skick, storlek, detaljer…" rows={2}
                  style={{...inp,resize:'none',lineHeight:1.5}} onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor='#E4E2DD'}/>
              </FL>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
                <FL label="Kategori"><SI value={form.category} onChange={v=>set('category',v)} options={['Kläder','Skor','Accessoarer','Hem','Övrigt']}/></FL>
                <FL label="Utpris (kr)"><TI value={form.utpris} onChange={v=>set('utpris',v)} type="number" placeholder="0"/></FL>
              </div>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>

                <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                  <input type="range" min="0" max="100" step="5" value={form.carroAndel} onChange={e=>set('carroAndel',parseInt(e.target.value))} style={{ flex:1, accentColor:C.primary }}/>
                  <span style={{ fontSize:14, fontWeight:700, color:C.primary, width:32, textAlign:'right' }}>{form.carroAndel}%</span>
                </div>
              </FL>
            </div>

            <div className="su">
              {/* ── Pris & andel ── */}

                        <div style={{ fontSize:28, fontWeight:700, color:C.primary, letterSpacing:-0.5 }}>{carroBelopp} kr</div>
                        <div style={{ fontSize:11, color:C.primary+'88', marginTop:2 }}>100% av {form.saltPris} kr</div>
                      </div>
                    : <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, paddingTop:4 }}>
                        <div style={{ background:C.primaryLight, borderRadius:12, padding:'12px' }}>
                          <div style={{ fontSize:11, fontWeight:700, color:C.primary, textTransform:'uppercase', letterSpacing:0.6, marginBottom:4 }}>Carros andel</div>
                          <div style={{ fontSize:26, fontWeight:700, color:C.primary, letterSpacing:-0.5 }}>{carroBelopp} kr</div>
                          <div style={{ fontSize:11, color:C.primary+'88', marginTop:2 }}>{form.carroAndel}%</div>

                <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                  {/* Status indicator */}
                  <div style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 12px', borderRadius:10, background:form.betald?C.primaryLight:C.redBg }}>
                    <Icon name={form.betald?'check-circle':'clock'} size={18} color={form.betald?C.primary:C.red}/>

                  </FL>
                  {isHandover ? (
                    <div className="su" style={{ background:'#EDE9FE', borderRadius:12, padding:'12px 14px' }}>
                      <div style={{ fontSize:12, fontWeight:700, color:'#5B21B6', marginBottom:8 }}>
                        {form.fraktmetod==='Hämtas'?'Köparen hämtar själv — inget fraktbolag behövs.':'Säljaren lämnar av hos köparen.'}
                      </div>
                      <FL label="Överlämningsdatum"><TI value={form.overlamnningsdatum} onChange={v=>set('overlamnningsdatum',v)} type="date"/></FL>
                    </div>
                  ) : (
                    <div className="su" style={{ display:'flex', flexDirection:'column', gap:10 }}>
                      <Toggle value={form.bokadFrakt} onChange={v=>set('bokadFrakt',v)} label="Frakt bokad"/>
                      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
                        <FL label="Fraktbolag"><SI value={form.fraktbolag} onChange={v=>set('fraktbolag',v)} options={['Postnord','DHL','Budbee','Instabox','DB Schenker','Annat']}/></FL>
                        <FL label="Fraktdatum"><TI value={form.fraktdatum} onChange={v=>set('fraktdatum',v)} type="date"/></FL>
                      </div>
                      {form.fraktbolag==='Annat'&&<FL label="Fraktbolagets namn"><TI value={form.annatFraktbolag} onChange={v=>set('annatFraktbolag',v)}/></FL>}
                      <FL label="Spårningsnummer"><TI value={form.fraktkod} onChange={v=>set('fraktkod',v)} placeholder="t.ex. SE123456789SE"/></FL>
                    </div>
                  )}
                </div>
              </SCard>
            </div>
          )}
        </div>
      </div>

      {/* Sticky save */}
      <div style={{ position:'absolute', bottom:0, left:0, right:0, background:'linear-gradient(to top, white 65%, transparent)', padding:'18px 16px 22px', pointerEvents:'none' }}>
        <button onClick={handleSave} style={{ width:'100%', height:52, background:C.cta, color:'white', border:'none', borderRadius:15, fontSize:17, fontWeight:700, cursor:'pointer', fontFamily:'inherit', boxShadow:'0 4px 20px rgba(232,120,74,0.4)', pointerEvents:'all' }}>
          {isEdit?'Spara ändringar':'Lägg till objekt'}
        </button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   ÄGARE
══════════════════════════════════════ */
function AgareScreen({ items, owners, onSelect }) {
  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%' }}>
      <div style={{ background:C.surface, padding:'12px 16px', borderBottom:`1px solid ${C.border}` }}>
        <div style={{ fontSize:22, fontWeight:700, color:C.text, letterSpacing:-0.3 }}>Ägare</div>
      </div>
      <div className="scroll" style={{ padding:'12px 14px 32px', display:'flex', flexDirection:'column', gap:12 }}>
        {owners.map(owner => {
          const oi=items.filter(i=>i.ownerId===owner.id);
          const sold=oi.filter(i=>i.sold);
          const omsat=sold.reduce((s,i)=>s+(parseFloat(i.saltPris)||0),0);
          const carro=sold.reduce((s,i)=>s+Math.round((parseFloat(i.saltPris)||0)*(i.carroAndel/100)),0);
          const agare=omsat-carro;
          const betalt=sold.filter(i=>i.betald).reduce((s,i)=>s+(parseFloat(i.saltPris)||0)-Math.round((parseFloat(i.saltPris)||0)*(i.carroAndel/100)),0);
          const obetalt=agare-betalt>0?agare-betalt:0;
          const pct=omsat>0?Math.round((betalt/agare)*100):0;

          return (
            <div key={owner.id} onClick={()=>onSelect(owner)} style={{ background:C.surface, borderRadius:18, boxShadow:'0 2px 12px rgba(0,0,0,0.07)', overflow:'hidden', cursor:'pointer' }}>
              {/* Header */}
              <div style={{ background:owner.color, padding:'14px 18px', display:'flex', alignItems:'center', gap:14 }}>
                <div style={{ width:46, height:46, borderRadius:'50%', background:'rgba(255,255,255,0.25)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:22, fontWeight:700, color:'white' }}>{owner.name[0]}</div>
                <div style={{ flex:1 }}>
                  <div style={{ color:'white', fontSize:19, fontWeight:700 }}>{owner.name}</div>
                  <div style={{ color:'rgba(255,255,255,0.7)', fontSize:12 }}>{oi.length} objekt · {sold.length} sålda · {oi.filter(i=>!i.sold).length} osålda</div>
                </div>
              </div>
              {/* Economics */}
              <div style={{ padding:'14px 18px' }}>
                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:12 }}>
                  <div style={{ background:C.bg, borderRadius:10, padding:'10px 12px' }}>
                    <div style={{ fontSize:11, color:C.textSec, fontWeight:600, marginBottom:3 }}>Omsättning</div>
                    <div style={{ fontSize:18, fontWeight:700, color:C.text }}>{omsat.toLocaleString('sv-SE')} kr</div>
                  </div>
                  <div style={{ background:owner.color+'14', borderRadius:10, padding:'10px 12px' }}>
                    <div style={{ fontSize:11, color:owner.color, fontWeight:600, marginBottom:3 }}>Ägarens andel</div>
                    <div style={{ fontSize:18, fontWeight:700, color:owner.color }}>{agare.toLocaleString('sv-SE')} kr</div>
                  </div>
                </div>
                {/* Payout progress */}
                {sold.length>0 && (
                  <>
                    <div style={{ display:'flex', justifyContent:'space-between', marginBottom:5 }}>
                      <span style={{ fontSize:12, fontWeight:600, color:C.textSec }}>Utbetalt till ägare</span>
                      <span style={{ fontSize:12, fontWeight:700, color:obetalt>0?C.red:C.primary }}>{obetalt>0?`${obetalt.toLocaleString('sv-SE')} kr väntar`:'Allt utbetalt'}</span>
                    </div>
                    <div style={{ height:6, background:C.bg, borderRadius:999, overflow:'hidden' }}>
                      <div style={{ height:'100%', width:`${pct}%`, background:owner.color, borderRadius:999, transition:'width 500ms' }}/>
                    </div>
                    <div style={{ fontSize:11, color:C.textMuted, marginTop:4 }}>{betalt.toLocaleString('sv-SE')} kr av {agare.toLocaleString('sv-SE')} kr betalt</div>
                  </>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   STATISTIK
══════════════════════════════════════ */
function StatistikScreen({ items, owners }) {
  const sold=items.filter(i=>i.sold);
  const omsat=sold.reduce((s,i)=>s+(parseFloat(i.saltPris)||0),0);
  const carro=sold.reduce((s,i)=>s+Math.round((parseFloat(i.saltPris)||0)*(i.carroAndel/100)),0);
  const agare=omsat-carro;
  const betaldKr=sold.filter(i=>i.betald).reduce((s,i)=>s+(parseFloat(i.saltPris)||0),0);
  const obetaldKr=omsat-betaldKr;

  const actions=[
    { label:'obetald', count:sold.filter(i=>!i.betald).length, color:C.red, icon:'credit-card', status:'Obetald' },
    { label:'väntar frakt', count:items.filter(i=>i.status==='Väntar frakt').length, color:'#92400E', icon:'clock', status:'Väntar frakt' },
    { label:'väntar överlämning', count:items.filter(i=>i.status==='Överlämning').length, color:'#5B21B6', icon:'map-pin', status:'Överlämning' },
  ].filter(a=>a.count>0);

  const byPlatform=['Vinted','TikTok'].map(p=>{
    const pl=sold.filter(i=>i.platform===p);
    return { name:p, count:pl.length, total:pl.reduce((s,i)=>s+(parseFloat(i.saltPris)||0),0) };
  });
  const byOwner=owners.map(o=>{
    const oi=sold.filter(i=>i.ownerId===o.id);
    return { name:o.name, color:o.color, count:oi.length, total:oi.reduce((s,i)=>s+(parseFloat(i.saltPris)||0),0), agare:oi.reduce((s,i)=>s+(parseFloat(i.saltPris)||0)-Math.round((parseFloat(i.saltPris)||0)*(i.carroAndel/100)),0) };
  });
  const maxP=Math.max(...byPlatform.map(p=>p.total),1);
  const maxO=Math.max(...byOwner.map(o=>o.total),1);

  const Bar=({ name, total, agare, count, color, max })=>{
    const pct=Math.round((total/max)*100);
    return (
      <div style={{ marginBottom:16 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:6 }}>
          <div style={{ fontSize:14, fontWeight:700, color:C.text }}>{name}</div>
          <div style={{ textAlign:'right' }}>
            <div style={{ fontSize:14, fontWeight:700, color:C.text }}>{total.toLocaleString('sv-SE')} kr</div>
            {agare!==undefined && <div style={{ fontSize:11, color:C.textSec }}>ägarandel: {agare.toLocaleString('sv-SE')} kr · {count} st</div>}
            {agare===undefined && <div style={{ fontSize:11, color:C.textSec }}>{count} st</div>}
          </div>
        </div>
        <div style={{ height:10, background:C.bg, borderRadius:999, overflow:'hidden' }}>
          <div style={{ height:'100%', width:`${pct}%`, background:color, borderRadius:999 }}/>
        </div>
      </div>
    );
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%' }}>
      <div style={{ background:C.surface, padding:'12px 16px', borderBottom:`1px solid ${C.border}`, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <div style={{ fontSize:22, fontWeight:700, color:C.text, letterSpacing:-0.3 }}>Statistik</div>
        <div style={{ display:'flex', alignItems:'center', gap:6, background:C.bg, borderRadius:10, padding:'6px 12px' }}>
          <Icon name="calendar" size={13} color={C.textSec}/>
          <span style={{ fontSize:13, fontWeight:600, color:C.text }}>April 2026</span>
        </div>
      </div>
      <div className="scroll" style={{ padding:'12px 14px 32px', display:'flex', flexDirection:'column', gap:10 }}>

        {/* Actionable alerts */}
        {actions.length>0 && (
          <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
            {actions.map(a=>(
              <div key={a.label} style={{ background:C.surface, borderRadius:12, padding:'11px 14px', display:'flex', alignItems:'center', gap:10, boxShadow:'0 2px 8px rgba(0,0,0,0.06)', borderLeft:`3px solid ${a.color}` }}>
                <Icon name={a.icon} size={17} color={a.color}/>
                <span style={{ fontSize:13, fontWeight:700, color:a.color }}>{a.count} objekt</span>
                <span style={{ fontSize:13, color:C.textSec }}>{a.label}</span>
              </div>
            ))}
          </div>
        )}

        {/* KPI grid */}
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
          {[
            { label:'Omsättning', val:`${omsat.toLocaleString('sv-SE')} kr`, accent:C.primary },
            { label:'Sålda objekt', val:`${sold.length} st`, sub:`${items.filter(i=>!i.sold).length} st osålda` },
            { label:'Carros andel', val:`${carro.toLocaleString('sv-SE')} kr`, accent:C.cta },
            { label:'Ägarna får', val:`${agare.toLocaleString('sv-SE')} kr` },
          ].map(({label,val,sub,accent})=>(
            <div key={label} style={{ background:C.surface, borderRadius:14, padding:'13px', boxShadow:'0 2px 10px rgba(0,0,0,0.06)', borderTop:accent?`3px solid ${accent}`:undefined }}>
              <div style={{ fontSize:20, fontWeight:700, color:C.text, letterSpacing:-0.4 }}>{val}</div>
              <div style={{ fontSize:12, color:C.textSec, marginTop:3 }}>{label}</div>
              {sub && <div style={{ fontSize:11, color:C.textMuted, marginTop:2 }}>{sub}</div>}
            </div>
          ))}
        </div>

        {/* Payment bar */}
        <div style={{ background:C.surface, borderRadius:14, padding:'14px', boxShadow:'0 2px 10px rgba(0,0,0,0.06)' }}>
          <div style={{ fontSize:13, fontWeight:700, color:C.text, marginBottom:10 }}>Betalstatus — omsättning</div>
          <div style={{ display:'flex', gap:0, borderRadius:8, overflow:'hidden', height:12, marginBottom:8 }}>
            <div style={{ flex:betaldKr, background:C.primary }}/>
            <div style={{ flex:Math.max(obetaldKr,0), background:obetaldKr>0?C.red+'40':C.primary }}/>
          </div>
          <div style={{ display:'flex', justifyContent:'space-between' }}>
            <span style={{ fontSize:12, color:C.primary, fontWeight:600 }}>Betald: {betaldKr.toLocaleString('sv-SE')} kr</span>
            {obetaldKr>0 && <span style={{ fontSize:12, color:C.red, fontWeight:600 }}>Obetald: {obetaldKr.toLocaleString('sv-SE')} kr</span>}
          </div>
        </div>

        {/* Per plattform */}
        <div style={{ background:C.surface, borderRadius:16, padding:'16px', boxShadow:'0 2px 10px rgba(0,0,0,0.06)' }}>
          <div style={{ fontSize:13, fontWeight:700, color:C.text, marginBottom:14 }}>Per plattform</div>
          {byPlatform.map(p=><Bar key={p.name} name={p.name} total={p.total} count={p.count} color={C.primary} max={maxP}/>)}
        </div>

        {/* Per ägare */}
        <div style={{ background:C.surface, borderRadius:16, padding:'16px', boxShadow:'0 2px 10px rgba(0,0,0,0.06)' }}>
          <div style={{ fontSize:13, fontWeight:700, color:C.text, marginBottom:14 }}>Per ägare — omsättning</div>
          {byOwner.map(o=><Bar key={o.name} name={o.name} total={o.total} agare={o.agare} count={o.count} color={o.color} max={maxO}/>)}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   APP ROOT
══════════════════════════════════════ */
function App() {
  const [items, setItems]=useState(()=>load('cs_items_v4',DEFAULT_ITEMS));
  const [owners]=useState(()=>load('cs_owners_v4',DEFAULT_OWNERS));
  const [tab, setTab]=useState(()=>localStorage.getItem('cs_tab_v4')||'hem');
  const [selItem, setSelItem]=useState(null);
  const [selOwner, setSelOwner]=useState(null);
  const [formMode, setFormMode]=useState(false);

  useEffect(()=>{ save('cs_items_v4',items); },[items]);
  useEffect(()=>{ localStorage.setItem('cs_tab_v4',tab); },[tab]);

  const navTo=t=>{ setTab(t); setSelItem(null); setSelOwner(null); setFormMode(false); };
  const openItem=item=>{ setSelItem(item); setFormMode(true); };
  const openOwner=owner=>setSelOwner(owner);
  const handleSave=updated=>{ setItems(prev=>updated.id&&prev.find(i=>i.id===updated.id)?prev.map(i=>i.id===updated.id?updated:i):[...prev,updated]); setFormMode(false); setSelItem(null); navTo('objekt'); };
  const handleDelete=()=>{ if(selItem) setItems(prev=>prev.filter(i=>i.id!==selItem.id)); setFormMode(false); setSelItem(null); navTo('objekt'); };

  const showNav=!formMode&&tab!=='nytt'&&!selOwner;

  let screen;
  if(formMode)        screen=<ItemFormScreen item={selItem} owners={owners} onSave={handleSave} onBack={()=>{setFormMode(false);setSelItem(null);}} onDelete={handleDelete}/>;
  else if(selOwner)   screen=<AgardetaljScreen owner={selOwner} items={items} onBack={()=>setSelOwner(null)} onSelectItem={openItem}/>;
  else if(tab==='nytt')     screen=<ItemFormScreen owners={owners} onSave={handleSave} onBack={()=>navTo('objekt')}/>;
  else if(tab==='hem')      screen=<HemScreen items={items} owners={owners}/>;
  else if(tab==='objekt')   screen=<ObjektScreen items={items} owners={owners} onSelect={openItem} onNav={navTo}/>;
  else if(tab==='agare')    screen=<AgareScreen items={items} owners={owners} onSelect={openOwner}/>;
  else if(tab==='statistik')screen=<StatistikScreen items={items} owners={owners}/>;

  return (
    <div className="phone">
      <div className="sbar">
        <span>9:41</span>
        <div style={{ display:'flex', gap:8, alignItems:'center', fontSize:13 }}>
          <span>●●●●</span><span>WiFi</span><span style={{ fontWeight:700 }}>100%</span>
        </div>
      </div>
      <div className="screen">{screen}</div>
      {showNav && <BottomNav active={tab} onNav={navTo}/>}
    </div>
  );
}

// Prevent body scroll/overscroll on mobile — only .scroll divs should scroll
document.addEventListener('touchmove', function(e) {
  let el = e.target;
  while (el && el !== document.body) {
    if (el.classList && el.classList.contains('scroll')) return;
    el = el.parentElement;
  }
  e.preventDefault();
}, { passive: false });

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

// Register service worker for PWA offline + installability
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(r => console.log('SW registered:', r.scope))
      .catch(e => console.log('SW registration failed:', e));
  });
}
</script>
